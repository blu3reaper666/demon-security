<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Page</title>

</head>

<body>

    <!-- Header Section -->
    <header>
        <h1>Welcome to My Website</h1>

    <!-- Navigation Section -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content Area -->
    <main>
        <h2>Home Page</h2>
        <p>This is a simple homepage demonstrating HTML5 structure and CSS styling.</p>

        <!-- Image Example -->
        <img src="https://via.placeholder.com/300" alt="Sample Image">
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 Matthew Powell</p>
    </footer>
